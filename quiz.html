<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — Be Extraordinary</title>
  <meta name="description" content="Execution Blocker Diagnostic Test" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    :root {
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Inter', 'Helvetica Neue', sans-serif;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --text-3xl: clamp(2.5rem, 1rem + 4vw, 5rem);
      --space-1:.25rem; --space-2:.5rem; --space-3:.75rem;
      --space-4:1rem; --space-6:1.5rem; --space-8:2rem;
      --space-10:2.5rem; --space-12:3rem; --space-16:4rem;
      --space-20:5rem; --space-24:6rem; --space-32:8rem;
      --radius-sm:.375rem; --radius-md:.5rem;
      --radius-lg:.75rem; --radius-full:9999px;
      --transition:200ms cubic-bezier(0.16,1,0.3,1);
      --content-default:1100px; --content-narrow:680px;
    }
    [data-theme="light"] {
      --bg:#ffffff; --surface:#f4f3ef; --border:rgba(0,0,0,0.08);
      --text:#000000; --text-muted:#333333; --text-faint:#999999;
      --accent:#ff6600; --accent-hover:#cc5200; --inverse-text:#ffffff;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
    body{font-family:var(--font-body);font-size:var(--text-base);color:var(--text);background:var(--bg);line-height:1.6;min-height:100dvh;}
    img{display:block;max-width:100%;height:auto;}
    a{color:inherit;text-decoration:none;}
    ul{list-style:none;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    p{text-wrap:pretty;}
    h1,h2,h3,h4{text-wrap:balance;line-height:1.05;}
    ::selection{background:rgba(0,0,0,0.12);color:var(--text);}
    :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:var(--radius-sm);}
    
    .section{padding-block:clamp(var(--space-16),8vw,var(--space-32));padding-inline:var(--space-8);max-width:var(--content-default);margin-inline:auto;}
    .eyebrow{font-size:var(--text-xs);font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:var(--space-8);}
    .section-title{font-family:var(--font-display);font-size:var(--text-3xl);font-weight:400;line-height:1.0;letter-spacing:-.02em;}
    
    .quiz-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--space-12);}
    .qcount{font-size:var(--text-sm);color:var(--text-muted);}
    .progress-wrap{margin-bottom:var(--space-12);}
    .progress{height:4px;background:var(--surface);border-radius:2px;position:relative;}
    .progress span{position:absolute;top:0;left:0;height:100%;background:var(--accent);border-radius:2px;transition:width 300ms ease-out;}
    .answers{display:grid;gap:var(--space-4);}
    .answer{padding:var(--space-6);border:1px solid var(--border);border-radius:var(--radius-md);text-align:left;font-size:var(--text-base);transition:all var(--transition);background:var(--bg);color:var(--text);line-height:1.6;}
    .answer:hover{background:var(--surface);border-color:var(--accent);transform:translateY(-2px);}
    
    .gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-16);align-items:start;}
    .gate-copy{display:flex;flex-direction:column;gap:var(--space-8);}
    .gate-form{display:flex;flex-direction:column;gap:var(--space-4);}
    .gate-form label{font-size:var(--text-sm);font-weight:500;color:var(--text-muted);}
    .gate-form input{padding:var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);font-size:var(--text-base);background:var(--bg);color:var(--text);}
    .gate-form input:focus{outline:2px solid var(--accent);outline-offset:2px;}
    .gate-form button{padding:var(--space-6) var(--space-8);background:var(--accent);color:var(--inverse-text);border-radius:var(--radius-md);font-weight:600;transition:opacity var(--transition);}
    .gate-form button:hover{opacity:.9;}
    
    .note-stack{display:flex;flex-direction:column;gap:var(--space-4);}
    .note-card{padding:var(--space-6);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);}
    .note-card strong{display:block;margin-bottom:var(--space-2);font-size:var(--text-sm);font-weight:600;}
    .note-card p{font-size:var(--text-sm);color:var(--text-muted);line-height:1.6;}
    
    .result-hero{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-16);align-items:start;margin-bottom:var(--space-16);}
    .result-copy{display:flex;flex-direction:column;gap:var(--space-8);}
    .result-title{font-family:var(--font-display);font-size:var(--text-3xl);font-weight:400;line-height:1.0;letter-spacing:-.02em;}
    .tagrow{display:flex;gap:var(--space-2);flex-wrap:wrap;}
    .tag{padding:var(--space-2) var(--space-4);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:500;color:var(--text-muted);}
    
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-16);align-items:start;}
    .result-text{font-size:var(--text-base);color:var(--text-muted);line-height:1.7;max-width:52ch;}
    .plan-list{display:flex;flex-direction:column;gap:var(--space-6);}
    .plan-item{display:flex;flex-direction:column;gap:var(--space-2);}
    .plan-item strong{font-size:var(--text-sm);font-weight:600;color:var(--text);}
    .plan-item p{font-size:var(--text-base);color:var(--text-muted);line-height:1.6;}
    
    .scorebar{display:flex;flex-direction:column;gap:var(--space-4);}
    .scoreline{display:flex;align-items:center;gap:var(--space-4);font-size:var(--text-sm);}
    .scoreline span{min-width:200px;}
    .track{flex:1;height:8px;background:var(--surface);border-radius:4px;position:relative;}
    .fill{position:absolute;top:0;left:0;height:100%;background:var(--accent);border-radius:4px;}
    
    .email-seq{display:flex;flex-direction:column;gap:var(--space-6);}
    .email-item{padding:var(--space-6);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);}
    .email-item strong{display:block;margin-bottom:var(--space-2);font-size:var(--text-sm);font-weight:600;}
    .tiny{font-size:var(--text-xs);color:var(--text-faint);}
    
    .cta{margin-top:var(--space-16);padding:var(--space-8);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);}
    .btns{display:flex;gap:var(--space-4);margin-top:var(--space-6);}
    .linkbtn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-4) var(--space-6);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:500;text-decoration:none;transition:all var(--transition);}
    .linkbtn.primary{background:var(--accent);color:var(--inverse-text);}
    .linkbtn.primary:hover{opacity:.9;}
    .linkbtn.secondary{background:var(--surface);border:1px solid var(--border);color:var(--text);}
    .linkbtn.secondary:hover{background:var(--bg);border-color:var(--accent);}
    
    .footer{border-top:1px solid var(--border);padding:var(--space-8) var(--space-16);display:flex;justify-content:space-between;align-items:center;font-size:var(--text-sm);color:var(--text-faint);}
    .footer a{color:var(--text-muted);transition:color var(--transition);}
    .footer a:hover{color:var(--text);}
    
    @media(max-width:768px){
      .quiz-head,.gate-grid,.result-hero,.result-grid{grid-template-columns:1fr;gap:var(--space-8);}
      .scoreline span{min-width:150px;}
      .btns{flex-direction:column;}
      .footer{flex-direction:column;gap:var(--space-4);text-align:center;}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useMemo } = React;
    
    const questions = [
      {
        text: "When you think about your biggest goal right now, what happens first?",
        answers: [
          { text: "I start researching more before I move.", type: "overthinker" },
          { text: "I get excited, then switch to something else.", type: "drifter" },
          { text: "I question whether I'm ready or good enough.", type: "selfdoubter" },
          { text: "I go hard immediately, then lose steam fast.", type: "sprinter" },
        ],
      },
      {
        text: "How often do you delay action because you want a better plan first?",
        answers: [
          { text: "Almost always.", type: "overthinker" },
          { text: "Often, because my priorities keep shifting.", type: "drifter" },
          { text: "Sometimes, because I don't trust my decision.", type: "selfdoubter" },
          { text: "Rarely, I act fast but struggle later.", type: "sprinter" },
        ],
      },
      {
        text: "Which statement sounds most like you?",
        answers: [
          { text: "I need more clarity before I commit.", type: "overthinker" },
          { text: "I have too many ideas and keep changing direction.", type: "drifter" },
          { text: "I know what to do, but I hesitate when it's time to execute.", type: "selfdoubter" },
          { text: "I can execute, but I struggle to stay consistent.", type: "sprinter" },
        ],
      },
      {
        text: "How clear are you on your single most important next move?",
        answers: [
          { text: "Not clear at all.", type: "drifter" },
          { text: "Somewhat clear, but I keep rethinking it.", type: "overthinker" },
          { text: "Clear, but I still hesitate.", type: "selfdoubter" },
          { text: "Very clear, but I overload myself.", type: "sprinter" },
        ],
      },
      {
        text: "What usually kills your momentum?",
        answers: [
          { text: "Too much analysis.", type: "overthinker" },
          { text: "Too many options.", type: "drifter" },
          { text: "Fear of getting it wrong.", type: "selfdoubter" },
          { text: "Mental or emotional exhaustion.", type: "sprinter" },
        ],
      },
      {
        text: "How do you handle a setback or slow result?",
        answers: [
          { text: "I go back to learning mode and rethink everything.", type: "overthinker" },
          { text: "I pivot to a new plan.", type: "drifter" },
          { text: "I take it personally and lose confidence.", type: "selfdoubter" },
          { text: "I push harder until I crash.", type: "sprinter" },
        ],
      },
      {
        text: "How often do you follow through on the priorities you set for the week?",
        answers: [
          { text: "Rarely, I end up revising the plan.", type: "overthinker" },
          { text: "About half the time, because I get pulled into other ideas.", type: "drifter" },
          { text: "I know the priorities, but I procrastinate on the hard ones.", type: "selfdoubter" },
          { text: "Most of the time, but I overextend.", type: "sprinter" },
        ],
      },
      {
        text: "If someone audited your current workflow, what would they probably say?",
        answers: [
          { text: "You think deeply but act slowly.", type: "overthinker" },
          { text: "You're talented but scattered.", type: "drifter" },
          { text: "You're capable but hesitant.", type: "selfdoubter" },
          { text: "You're intense but unsustainable.", type: "sprinter" },
        ],
      },
      {
        text: "What feels hardest right now?",
        answers: [
          { text: "Deciding what matters most.", type: "drifter" },
          { text: "Stopping the analysis loop.", type: "overthinker" },
          { text: "Trusting myself enough to move.", type: "selfdoubter" },
          { text: "Regulating my energy so I stay consistent.", type: "sprinter" },
        ],
      },
      {
        text: "What result do you want most in the next 30 days?",
        answers: [
          { text: "A clear decision and clean plan.", type: "overthinker" },
          { text: "Focused execution on one path.", type: "drifter" },
          { text: "Stronger confidence under pressure.", type: "selfdoubter" },
          { text: "Sustainable momentum without burnout.", type: "sprinter" },
        ],
      },
    ];

    const results = {
      overthinker: {
        eyebrow: "Execution Blocker: The Overthinker",
        title: "You are The Overthinker.",
        hook: "Your problem is not laziness. Your problem is decision drag.",
        body: "You keep trying to eliminate uncertainty before you act, so the action window keeps closing. Your breakthrough comes when you stop trying to feel perfectly ready and start proving clarity through controlled action.",
        tags: ["Analysis paralysis", "High standards", "Decision drag"],
        plan: [
          "Pick one outcome for the next 7 days. Cut every secondary objective.",
          "Use a 15-minute decision rule: if the next move is reversible, decide fast and move.",
          "Ship one imperfect action within 24 hours.",
        ],
        ctaTitle: "Move from thinking to committed execution.",
        ctaBody: "Book the Clarity & Execution Call. Use it to diagnose the one bottleneck slowing your business and lock a single execution path.",
        buttonText: "Book my Clarity & Execution Call",
      },
      drifter: {
        eyebrow: "Execution Blocker: The Drifter",
        title: "You are The Drifter.",
        hook: "Your issue is not lack of ambition. It is fragmentation.",
        body: "You leak power by splitting attention across too many goals, tools, and identities. You keep re-opening strategy instead of extracting depth from one lane. Your breakthrough comes from constraint, not expansion.",
        tags: ["Scattered focus", "Too many ideas", "Low strategic constraint"],
        plan: [
          "Choose one primary goal for the next 30 days and define what does not matter right now.",
          "Create a kill list with three active distractions you will pause immediately.",
          "Run one execution sprint for 72 hours on a single asset.",
        ],
        ctaTitle: "Collapse your chaos into one path.",
        ctaBody: "Book the Clarity & Execution Call. Use the call to cut noise, choose one growth path, and build a sequence you can actually sustain.",
        buttonText: "Collapse my focus now",
      },
      selfdoubter: {
        eyebrow: "Execution Blocker: The Self-Doubter",
        title: "You are The Self-Doubter.",
        hook: "You usually know more than enough. The problem is that pressure collapses your self-trust right when action matters.",
        body: "Action feels like exposure. Once the move becomes visible, judged, or measurable, confidence drops and delay rises. Your breakthrough comes from building evidence-based confidence through fast proof, not waiting for emotion to catch up.",
        tags: ["Hesitation", "Fear of getting it wrong", "Low self-trust under pressure"],
        plan: [
          "Choose one action you have been delaying and define the smallest visible version of it.",
          "Replace outcome pressure with proof pressure: your only job is to generate one piece of evidence within 48 hours.",
          "Track completed courageous actions, not feelings, for the next 7 days.",
        ],
        ctaTitle: "Rebuild self-trust through visible proof.",
        ctaBody: "Book the Clarity & Execution Call. The call helps you identify the fear loop, reduce the stakes, and lock a proof-based action sequence that rebuilds confidence fast.",
        buttonText: "Rebuild my self-trust",
      },
      sprinter: {
        eyebrow: "Execution Blocker: The Sprinter-Burnout",
        title: "You are The Sprinter-Burnout.",
        hook: "You can execute hard, but you can't sustain. Your pattern is intensity → exhaustion → recovery → repeat.",
        body: "You treat execution like a series of sprints instead of a marathon. You push until you crash, then recover, then repeat. Your breakthrough comes from building systems that regulate energy and create sustainable momentum.",
        tags: ["Intensity without sustainability", "Energy crashes", "Inconsistent execution"],
        plan: [
          "Define your sustainable daily output ceiling and work backward from there.",
          "Build a weekly rhythm that includes recovery blocks as non-negotiable.",
          "Create a stop-loss rule: when energy drops below 60%, you must switch to maintenance mode.",
        ],
        ctaTitle: "Build sustainable execution systems.",
        ctaBody: "Book the Clarity & Execution Call. Use the call to design energy-regulating systems and build execution patterns that don't require heroic effort.",
        buttonText: "Build my sustainable systems",
      },
    };

    function QuizApp() {
      const [screen, setScreen] = useState('poster');
      const [index, setIndex] = useState(0);
      const [scores, setScores] = useState({});
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [error, setError] = useState('');
      const [totalAnswered, setTotalAnswered] = useState(0);

      const current = questions[index];
      const progress = ((index + 1) / questions.length) * 100;

      const choose = (type) => {
        const newScores = { ...scores, [type]: (scores[type] || 0) + 1 };
        setScores(newScores);
        setTotalAnswered(totalAnswered + 1);
        
        if (index + 1 < questions.length) {
          setIndex(index + 1);
        } else {
          setScreen('gate');
        }
      };

      const submitGate = (e) => {
        e.preventDefault();
        if (!name || !email) {
          setError('Please fill in all fields');
          return;
        }
        setScreen('result');
      };

      const orderedScores = useMemo(() => {
        return Object.entries(scores).sort(([,a], [,b]) => b - a);
      }, [scores]);

      const dominant = orderedScores[0]?.[0] || 'overthinker';
      const result = results[dominant];

      if (screen === 'poster') {
        return (
          <div className="section">
            <div className="poster-card">
              <h3>Stop performing interest.</h3>
              <p>Start producing results. The gap between vision and reality is discipline.</p>
            </div>
            <div className="note-stack">
              <div className="note-card">
                <strong>What this gives you</strong>
                <p>A clean read on your execution pattern and a simple correction path.</p>
              </div>
              <div className="note-card">
                <strong>What to do next</strong>
                <p>Take the quiz, see your result, then use the booking link to turn insight into action.</p>
              </div>
            </div>
            <div style={{ textAlign: 'center', marginTop: '3rem' }}>
              <button 
                className="linkbtn primary" 
                onClick={() => setScreen('quiz')}
                style={{ fontSize: '1.1rem', padding: '1rem 2rem' }}
              >
                Take the Execution Blocker Test
              </button>
            </div>
          </div>
        );
      }

      if (screen === 'quiz') {
        return (
          <div className="section">
            <div className="quiz-head">
              <div>
                <div className="eyebrow">Execution Blocker Diagnostic</div>
                <h2 className="section-title">{current.text}</h2>
              </div>
              <div className="qcount">
                Question {index + 1} of {questions.length}
              </div>
            </div>
            <div className="progress-wrap">
              <div className="progress">
                <span style={{ width: `${progress}%` }} />
              </div>
            </div>
            <div className="answers">
              {current.answers.map((answer) => (
                <button key={answer.text} className="answer" onClick={() => choose(answer.type)}>
                  {answer.text}
                </button>
              ))}
            </div>
          </div>
        );
      }

      if (screen === 'gate') {
        return (
          <div className="section">
            <div className="gate-grid">
              <div className="gate-copy">
                <div className="eyebrow">Unlock your result</div>
                <h2 className="section-title">Your result is ready.</h2>
                <p>
                  Enter your details to see your blocker profile, your 72-hour correction plan, and book your fit call.
                </p>
                <form className="gate-form" onSubmit={submitGate}>
                  <div>
                    <label htmlFor="name">First name</label>
                    <input
                      id="name"
                      name="name"
                      placeholder="Your first name"
                      value={name}
                      onChange={(e) => setName(e.target.value)}
                    />
                    <label htmlFor="email">Email</label>
                    <input
                      id="email"
                      name="email"
                      type="email"
                      placeholder="you@example.com"
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                    />
                    <button type="submit" className="primary">
                      Show my result & book call
                    </button>
                    <p className="tiny" style={{ marginTop: 10, color: "#999999" }}>
                      {error || ""}
                    </p>
                  </div>
                </form>
              </div>
              <div className="note-stack">
                <div className="note-card">
                  <strong>Why we need this</strong>
                  <p>Your results will be displayed immediately, and you can use the booking link right away.</p>
                </div>
                <div className="note-card">
                  <strong>What happens next</strong>
                  <p>You'll get your profile, correction plan, and the exact CTA for the next step.</p>
                </div>
                <div className="note-card">
                  <strong>Current snapshot</strong>
                  <p>Total points collected so far: {totalAnswered}/{questions.length}.</p>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (screen === 'result') {
        return (
          <div>
            <div className="section result-top">
              <div className="result-hero">
                <div className="result-copy">
                  <div className="eyebrow">{result.eyebrow}</div>
                  <h2 className="result-title">{name ? `${name}, ${result.title}` : result.title}</h2>
                  <p>{result.hook}</p>
                  <div className="tagrow">
                    {result.tags.map((tag) => (
                      <div key={tag} className="tag">
                        {tag}
                      </div>
                    ))}
                  </div>
                </div>
                <div className="note-stack">
                  <div className="note-card">
                    <strong>What you get</strong>
                    <p>72-hour correction plan, score map, and a coaching CTA to turn the result into motion.</p>
                  </div>
                  <div className="note-card">
                    <strong>Booking link</strong>
                    <p>Use the booking link below if you want help turning the readout into action.</p>
                  </div>
                </div>
              </div>
            </div>

            <div className="section result-grid">
              <div>
                <h3 className="section-title" style={{ fontSize: "clamp(1.8rem, 3vw, 2.8rem)" }}>
                  What this means
                </h3>
                <p className="result-text">{result.body}</p>

                <h3 className="section-title" style={{ fontSize: "clamp(1.8rem, 3vw, 2.8rem)", marginTop: 24 }}>
                  Your 72-hour correction plan
                </h3>
                <div className="plan-list">
                  {result.plan.map((item, i) => (
                    <div key={item} className="plan-item">
                      <strong>Step {i + 1}</strong>
                      <p>{item}</p>
                    </div>
                  ))}
                </div>

                <div className="cta">
                  <h3 className="section-title" style={{ fontSize: "clamp(1.6rem, 2.6vw, 2.4rem)", marginBottom: 10 }}>
                    {result.ctaTitle}
                  </h3>
                  <p>{result.ctaBody}</p>
                  <div className="btns book">
                    <a
                      className="linkbtn primary"
                      href="https://cal.com/be-extraordinary/90min"
                      target="_blank"
                      rel="noopener noreferrer"
                    >
                      → {result.buttonText}
                    </a>
                    <a
                      className="linkbtn secondary"
                      href="https://cal.com/be-extraordinary/90min"
                      target="_blank"
                      rel="noopener noreferrer"
                    >
                      ✓ Get your execution plan
                    </a>
                  </div>
                </div>
              </div>
              <div>
                <h3 className="section-title" style={{ fontSize: "clamp(1.8rem, 3vw, 2.8rem)" }}>
                  Score map
                </h3>
                <div className="scorebar">
                  {orderedScores.map(([type, value]) => {
                    const pct = Math.round((value / questions.length) * 100);
                    const labels = {
                      overthinker: "Overthinker",
                      drifter: "Drifter",
                      selfdoubter: "Self-Doubter",
                      sprinter: "Sprinter-Burnout",
                    };
                    return (
                      <div key={type} className="scoreline">
                        <span>
                          {labels[type]} • {value}/{questions.length}
                        </span>
                        <div className="track">
                          <div className="fill" style={{ width: `${pct}%` }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.render(<QuizApp />, document.getElementById('root'));
  </script>
</body>
</html>
